; ================================================================
; Debug Simulations 
; ================================================================

; 1) Wheel_MRF


; ================================================================
; Debug Simulations Configuration
; ================================================================

[Wheel_MRF]
; Simulation name used for output file naming
sim_name = DEBUG_Wheel_MRF

; Path to the CAD geometry file
CAD_file = DEBUG_Wheel_MRF.pmdb
iterations = 1000
processor_count = 16
velocity = 13.5

; Force monitors: each entry is [name, direction_vector]
; down-force: -Z, drag-force: +X, side-force: +Y
forces_list = [
    ["down-force", [0, 0, -1]],
    ["drag-force",  [1, 0,  0]],
    ["side-force",  [0, 1,  0]]
    ]

; surface_mesh_global
; Global surface mesh size limits in mm
max_size = 10
min_size = 0.5

; volume_mesh
volume_fill = poly-hexcore
growth_rate = 1.2
tet_poly_max_cell_length = 60

; surface_mesh_options
; Local sizing per component — JSON list of sizing control dicts
surface_mesh_list = [
    {"name": "wheel_contact_patch", "curvature_angle": 18, "type": "Curvature", "apply_to": "chassis", "MinSize": 0.5,   "MaxSize": 2.5, "Scope_to": "faces and edges"},
    {"name": "wheel",  "curvature_angle": 18, "type": "Curvature", "apply_to": "wheel",    "MinSize": 1, "MaxSize": 2.5, "Scope_to": "faces and edges"}
    ]

; boundary_layer_options
; Boundary layer controls — JSON list
; grow_on: "all-zones" grows BL on all faces in region_scope
; grow_on: "selected-labels" restricts growth to the faces in label_list
; offset_method: "last-ratio" uses transition_ratio to grow layers from first_layer_height
boundary_layer_list = [
    {
        "name": "mrf_boundary_layers",
        "grow_on": "all-zones",
        "regions_type": "named-regions",
        "region_scope": "mrf",
        "first_layer_height": 0.25,
        "layers": 10,
        "transition_ratio": 0.272,
        "offset_method": "last-ratio"
    },
    {
        "name": "wheel_boundary_layers",
        "grow_on": "selected-labels",
        "regions_type": "named-regions",
        "label_list": ["wheel", "wheel_contact_patch"],
        "region_scope": ["domain"],
        "first_layer_height": 0.25,
        "layers": 10,
        "transition_ratio": 0.272,
        "offset_method": "last-ratio"
    }
    ]

; refinement_zones
; Body of Influence (BOI) refinement boxes — JSON list
; Coordinates in mm, BOIMaxSize in mm
refinement_list = [
    {"name": "Inner_BOI", "BOIMaxSize": 2.5, "Xmin": 250,  "Xmax": 1250, "Ymin": -350, "Ymax": -150, "Zmin": 0, "Zmax": 180},
    {"name": "Mid_BOI",   "BOIMaxSize": 10,  "Xmin": 400,  "Xmax": 800,  "Ymin": -300, "Ymax": -200, "Zmin": 0, "Zmax": 250}
    ]

; mrf-zones
; MRF zones for rotating components
; Coordinates in mm, rotation_axis_direction is a unit vector, rotation_axis_origin is a point at the center of the MRF volume in mm, omega in rad/s
mrf_zones_data = {
    "mrf": {"omega": 57.45, "rotation_axis_origin": [0.5, -0.25, 0.076], "rotation_axis_direction": [0, -1, 0]}
    }

; wheels
; Wheel rotation settings — omega in rad/s, coordinates in m
; omega = velocity / wheel_radius = 13.5 / 0.235 ≈ 57.45 rad/s
wheels_data = {
    "mrf": {"omega": 57.45, "rotation_axis_origin": [0.5, -0.25, 0.076], "rotation_axis_direction": [0, -1, 0]}
    }


; ================================================================
; Wings monitors — aero force reporting on front/rear wing
; ================================================================

[Wings_Monitors]
sim_name = DEBUG_Wings_Monitors
CAD_file = wings_debug.pmdb
iterations = 1000
processor_count = 16
velocity = 13.5

; Force monitors
forces_list = [
    ["down-force", [0, 0, -1]],
    ["drag-force",  [1, 0,  0]],
    ["side-force",  [0, 1,  0]]
    ]

; surface_mesh_global
max_size = 10
min_size = 0.5

; volume_mesh
volume_fill = poly-hexcore
growth_rate = 1.2
tet_poly_max_cell_length = 60

; surface_mesh_options
surface_mesh_list = [
    {"name": "front_wing", "curvature_angle": 18, "type": "Curvature", "apply_to": "fw", "MinSize": 0.5, "MaxSize": 2.5, "Scope_to": "faces and edges"},
    {"name": "rear_wing",  "curvature_angle": 18, "type": "Curvature", "apply_to": "rw", "MinSize": 0.5, "MaxSize": 2.5, "Scope_to": "faces and edges"}
    ]

; boundary_layer_options
boundary_layer_list = [
    {
        "name": "wing_boundary_layers",
        "grow_on": "selected-labels",
        "regions_type": "named-regions",
        "label_list": ["fw", "rw"],
        "region_scope": ["domain"],
        "first_layer_height": 0.25,
        "layers": 10,
        "transition_ratio": 0.272,
        "offset_method": "last-ratio"
    }
    ]

; refinement_zones
refinement_list = [
    {"name": "Front_Wing_BOI", "BOIMaxSize": 2.5, "Xmin": -350, "Xmax": 275,  "Ymin": -850, "Ymax": 0, "Zmin": 0,   "Zmax": 250},
    {"name": "Rear_Wing_BOI",  "BOIMaxSize": 2.5, "Xmin": 1875, "Xmax": 3000, "Ymin": -500, "Ymax": 0, "Zmin": 600, "Zmax": 1200}
    ]

; Wings_Monitors has no MRF or wheel rotation — omit mrf_zones_data and wheels_data

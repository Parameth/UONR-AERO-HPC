[config]
; Set to 'operations' or 'debug' to select config profile
mode = operations

; ================================================================
; OPERATIONS PROFILE — Full resolution production run
; ================================================================

[simulation]
; Simulation name used for output file naming
sim_name = Code_Dev_004
; Path to the CAD geometry file
CAD_file = test_CAD.pmdb
Mesh_file = test_mesh.h5

; HPC RUN settings: DO NOT EDIT UNLESS YOU KNOW WHAT YOU ARE DOING! - Methy
[solver]
iterations = 500
processor_count = 16
; Freestream velocity in m/s — applied to inlet, moving ground, and reference values
velocity = 13.5

[zones]
; Aerodynamic component zones used for force reporting
list = ["chassis", "rw", "fw"]

[forces]
; Force monitors: each entry is [name, direction_vector]
; down-force: -Z, drag-force: +X, side-force: +Y
list = [
    ["down-force", [0, 0, -1]],
    ["drag-force",  [1, 0,  0]],
    ["side-force",  [0, 1,  0]]
    ]

[surface_mesh_global]
; Global surface mesh size limits in mm
max_size = 512
min_size = 2

[volume_mesh]
volume_fill = poly-hexcore
growth_rate = 1.2
tet_poly_max_cell_length = 512

[surface_mesh_options]
; Local sizing per component — JSON list of sizing control dicts
list = [
    {"name": "wings",   "curvature_angle": 9,  "type": "Curvature", "apply_to": ["fw", "rw"],               "MinSize": 0.5, "MaxSize": 5,  "Scope_to": "faces and edges"},
    {"name": "chassis", "curvature_angle": 12, "type": "Curvature", "apply_to": "chassis",                        "MinSize": 1,   "MaxSize": 32, "Scope_to": "faces and edges"},
    {"name": "wheels",  "curvature_angle": 18, "type": "Curvature", "apply_to": ["rear_wheel", "front_wheel"],    "MinSize": 0.5, "MaxSize": 32, "Scope_to": "faces"}
    ]

[boundary_layer_options]
; Boundary layer controls — JSON list
; grow_on: "all-zones" grows BL on all faces in region_scope
; grow_on: "selected-labels" restricts growth to the faces in label_list
; offset_method: "last-ratio" uses transition_ratio to grow layers from first_layer_height
list = [
    {
        "name": "mrf_boundary_layers",
        "grow_on": "all-zones",
        "regions_type": "named-regions",
        "region_scope": ["fluid", "fluid_1"],
        "first_layer_height": 0.25,
        "layers": 10,
        "transition_ratio": 0.272,
        "offset_method": "last-ratio"
    },
    {
        "name": "wing_boundary_layers",
        "grow_on": "selected-labels",
        "regions_type": "named-regions",
        "label_list": ["fw", "rw"],
        "region_scope": ["solid"],
        "first_layer_height": 0.25,
        "layers": 10,
        "transition_ratio": 0.272,
        "offset_method": "last-ratio"
    },
    {
        "name": "wheel_boundary_layers",
        "grow_on": "selected-labels",
        "regions_type": "named-regions",
        "label_list": ["front_wheel", "rear_wheel"],
        "region_scope": ["solid"],
        "first_layer_height": 0.25,
        "layers": 10,
        "transition_ratio": 0.272,
        "offset_method": "last-ratio"
    }
    ]


[refinement_zones]
; Body of Influence (BOI) refinement boxes — JSON list
; Coordinates in mm, BOIMaxSize in mm
list = [
    {"name": "Inner_BOI",   "BOIMaxSize": 16,  "Xmin": -500,  "Xmax": 3500,  "Ymin": 0, "Ymax": 1000, "Zmin": 0, "Zmax": 1250},
    {"name": "Mid_BOI",     "BOIMaxSize": 64,  "Xmin": -2000, "Xmax": 8000,  "Ymin": 0, "Ymax": 2000, "Zmin": 0, "Zmax": 2000},
    {"name": "Outer_BOI",   "BOIMaxSize": 128, "Xmin": -3500, "Xmax": 14000, "Ymin": 0, "Ymax": 3500, "Zmin": 0, "Zmax": 3000},
    {"name": "Front_Wing",  "BOIMaxSize": 8,   "Xmin": -350,  "Xmax": 275,   "Ymin": 0, "Ymax": 850,  "Zmin": 0, "Zmax": 250},
    {"name": "Side_Wing",   "BOIMaxSize": 8,   "Xmin": 825,   "Xmax": 2650,  "Ymin": 0, "Ymax": 500,  "Zmin": 0, "Zmax": 225},
    {"name": "Rear_Wing",   "BOIMaxSize": 8,   "Xmin": 1875,  "Xmax": 3000,  "Ymin": 0, "Ymax": 500,  "Zmin": 600,  "Zmax": 1200},
    {"name": "Front_Wheel", "BOIMaxSize": 8,   "Xmin": 350,   "Xmax": 950,   "Ymin": 450,  "Ymax": 775,  "Zmin": 1, "Zmax": 500},
    {"name": "Rear_Wheel",  "BOIMaxSize": 8,   "Xmin": 1750,  "Xmax": 2700,  "Ymin": 450,  "Ymax": 775,  "Zmin": 1, "Zmax": 500}
    ]

[postpro]
; Path to the pvpython executable
pvpython_path = pvpython
; Whether to run ParaView post-processing after the solve
enabled = true
; Output image resolution
image_width  = 2922
image_height = 1554
; X-plane slice sweep: from x_start down to x_end (metres)
x_start    = 3.0
x_end      = -0.5
; Y-plane slice sweep: from y_start down to y_end (metres)
y_start    = 0.0
y_end      = 1.0
; Step size between slices (metres)
slice_step = 0.01
; Camera view bounds for X-plane screenshots (metres)
xplane_ymin = -2.0
xplane_ymax =  2.0
xplane_zmin =  0.0
xplane_zmax =  2.0
; Camera view bounds for Y-plane screenshots (metres)
yplane_xmin = -0.5
yplane_xmax =  2.5
yplane_zmin =  0.0
yplane_zmax =  2.0
; Air density for dynamic pressure (kg/m^3) — velocity taken from [solver]
air_density = 1.225
; Colormap ranges
cpt_cmin    = -0.66
cpt_cmax    =  1.0
cp0_cmin    = -1.0
cp0_cmax    =  1.0
vtxmag_cmin =  0
vtxmag_cmax =  500

[mrf-zones]
; MRF zones for rotating components — JSON list
; Coordinates in mm, rotation_axis_direction is a unit vector, rotation_axis_origin is a point at the center of the MRF volume in mm, omega in rad/s
data = {
    "fluid_1": {"omega": 57.45, "rotation_axis_origin": [0.64048, 0.68691, 0.235],  "rotation_axis_direction": [0, -1, 0]},
    "fluid":  {"omega": 57.45, "rotation_axis_origin": [2.04850, 0.61, 0.235], "rotation_axis_direction": [0, -1, 0]}
    }

[wheels]
; Wheel rotation settings — omega in rad/s, coordinates in m
; omega = velocity / wheel_radius = 13.5 / 0.235 ≈ 57.45 rad/s
data = {
    "front_wheel": {"omega": 57.45, "rotation_axis_origin": [0.64048, 0.6269, 0.2575],  "rotation_axis_direction": [0, -1, 0]},
    "rear_wheel":  {"omega": 57.45, "rotation_axis_origin": [2.04850, 0.612545, 0.2575], "rotation_axis_direction": [0, -1, 0]}
    }


; ================================================================
; DEBUG PROFILE — Coarse/fast run for pipeline testing
; ================================================================

[debug_simulation]
; Simulation name used for output file naming
sim_name = Debug_001
; Path to the CAD geometry file
CAD_file = test_CAD.pmdb
Mesh_file = test_mesh.h5

[debug_solver]
; Reduced iteration count and processor usage for quick turnaround
iterations = 50
processor_count = 4
; Freestream velocity in m/s — applied to inlet, moving ground, and reference values
velocity = 13.5

[debug_zones]
; Reduced to chassis only for faster force reporting
list = ["chassis"]

[debug_forces]
; Reduced monitor set — side-force omitted for speed
list = [
    ["down-force", [0, 0, -1]],
    ["drag-force",  [1, 0,  0]]
    ]

[debug_surface_mesh_global]
; Coarser global mesh limits for faster meshing
max_size = 1024
min_size = 8

[debug_volume_mesh]
volume_fill = poly-hexcore
growth_rate = 1.2
tet_poly_max_cell_length = 1024

[debug_surface_mesh_options]
; Coarser local sizing — larger angles and size limits
